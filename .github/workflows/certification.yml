name: Downstream certification

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - run: npm ci
      - name: Run pinned downstream certification
        run: npm run certify
        env:
          CERTIFICATION_CADENCE: ${{ github.event_name == 'schedule' && 'nightly' || 'manual' }}
      - name: Upload honest receipt and browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downstream-certification-${{ github.sha }}
          path: |
            artifacts/receipts/
            .cache/products/asha-rulebench-*/test-results/
            .cache/products/asha-rulebench-*/playwright-report/
          if-no-files-found: warn
